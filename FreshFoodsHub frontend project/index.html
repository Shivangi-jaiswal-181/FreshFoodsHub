<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshFoodsHub</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;

        }

        header{
            background-color: #2e8b57;
            color: white;
            padding: 20px;
        }

        h1{
            margin: 0;
        }

        .container{
            margin-top: 50px;
        }

        button{

            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background-color: #2e8b57;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background-color: #246b45;
        }

<body>

    <header>
        <h1>FreshFoodsHub</h1>
        <p>Fresh & Healthy Food Delivered to Your Doorstep</p>
    </header>

    <div class="container">

        <button onclick="window.location.href='register.html'">
            User Registration & Login
        </button>
        <br>

        <button onclick="window.location.href='products.html'">
            Product Listing
        </button>
        <br>

        <button onclick="window.location.href='search.html'">
            Product Search & Browse
        </button>
        <br>

        <button onclick="window.location.href='payment.html'">
            Online Ordering & Payment
        </button>
        <br>

        <button onclick="window.location.href='tracking.html'">
            Order Tracking
        </button>

    </div>

</html>

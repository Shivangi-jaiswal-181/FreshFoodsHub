<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search - FreshFoodsHub</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
        }

        header{
            background-color: #2e8b57;
            color: white;
            padding: 20px;
        }

        .container{
            margin-top: 50px;
        }

        input{
            width: 300px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            padding: 10px 20px;
            background-color: #2e8b57;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #246b45;
        }

        #result{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2e8b57;
        }

        .back{
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #555;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>FreshFoodsHub</h1>
    <h2>Product Search & Browse</h2>
</header>

<div class="container">

    <input type="text" id="searchBox" placeholder="Enter Product Name">

    <button onclick="searchProduct()">Search</button>

    <div id="result"></div>

    <a href="index.html" class="back">Back to Home</a>

</div>

<script>

function searchProduct(){

    let product = document.getElementById("searchBox").value.toLowerCase();

    let result = document.getElementById("result");

    if(product === "apple"){
        result.innerHTML = "🍎 Apple Available - ₹120/Kg";
    }
    else if(product === "banana"){
        result.innerHTML = "🍌 Banana Available - ₹50/Dozen";
    }
    else if(product === "milk"){
        result.innerHTML = "🥛 Milk Available - ₹60/Litre";
    }
    else if(product === "bread"){
        result.innerHTML = "🍞 Bread Available - ₹40/Pack";
    }
    else{
        result.innerHTML = "❌ Product Not Found";
    }
}

</script>

</body>
</html>
